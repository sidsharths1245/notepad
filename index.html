<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad</title>
    <style>
        :root {
            --bg-body: #272727;
            --bg-sidebar: #1c1c1c;
            --bg-header: #1c1c1c;
            --border-color: #333333;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --item-hover: #2d2d2d;
            --item-active: #333333;
            --accent: #7a3ce8;
            --code-bg: #1e1e1e;
            --danger: #ff4c4c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { display: flex; height: 100%; }

        ::-webkit-scrollbar { width: 14px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #555; border: 4px solid var(--bg-body); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #777; }

        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .sidebar.collapsed { margin-left: -260px; }

        .sidebar-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .sidebar-header-actions { display: flex; gap: 4px; }

        .notes-list { list-style: none; overflow-y: auto; flex: 1; padding: 0 8px 8px 8px; }
        .notes-list li {
            padding: 10px 12px; margin-bottom: 2px; cursor: pointer; border-radius: 4px;
            border-left: 3px solid transparent; transition: background-color 0.1s; display: flex; gap: 10px;
        }
        .notes-list li:hover { background-color: var(--item-hover); }
        .notes-list li.active { background-color: var(--item-active); border-left: 3px solid var(--accent); }

        .note-item-info { flex: 1; min-width: 0; }
        .note-item-title { font-size: 14px; font-weight: 400; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-item-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .note-item-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .tag-badge { font-size: 10px; background-color: var(--border-color); color: var(--text-secondary); padding: 2px 6px; border-radius: 10px; border: 1px solid transparent; }
        .notes-list li.active .tag-badge { border-color: var(--accent); color: var(--accent); background: transparent; }

        .note-checkbox { display: none; width: 16px; height: 16px; border: 1.5px solid var(--text-secondary); border-radius: 3px; background: transparent; cursor: pointer; position: relative; appearance: none; outline: none; flex-shrink: 0; margin-top: 2px; }
        .note-checkbox:checked { background-color: var(--accent); border-color: var(--accent); }
        .note-checkbox:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        
        .bulk-mode .note-checkbox { display: block; }
        .bulk-footer { display: none; padding: 12px; background-color: var(--bg-header); border-top: 1px solid var(--border-color); flex-direction: column; gap: 8px; }
        .bulk-mode .bulk-footer { display: flex; }
        .bulk-btn { width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; text-align: center; }
        .bulk-btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); }
        .bulk-btn-secondary:hover { background-color: var(--item-hover); }

        .auth-footer { padding: 12px; background-color: var(--bg-header); border-top: 1px solid var(--border-color); }
        .bulk-mode ~ .auth-footer { display: none; }
        .auth-btn { width: 100%; padding: 8px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .auth-btn:hover { background: var(--accent); color: #ffffff; }

        .editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; background-color: var(--bg-body); }
        .editor-header { padding: 8px 16px; background-color: var(--bg-header); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; height: 48px; }
        #note-title { flex: 1; font-size: 14px; font-weight: 400; border: none; outline: none; background: transparent; color: var(--text-primary); font-family: inherit; }
        #note-title::placeholder { color: var(--text-secondary); }

        .editor-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .format-toolbar {
            display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-body); align-items: center;
        }
        .format-toolbar .icon-btn {
            width: 38px; height: 38px; color: var(--text-secondary);
        }
        .format-toolbar .icon-btn:hover { color: var(--text-primary); background-color: var(--item-hover); }
        .format-toolbar .icon-btn.active { color: var(--accent); background-color: var(--item-active); }
        .format-toolbar .icon-btn svg { width: 18px; height: 18px; }

        .editor-header .icon-btn { width: 36px; height: 36px; }
        .editor-header .icon-btn svg { width: 18px; height: 18px; }
        .sidebar-header .icon-btn { width: 36px; height: 36px; }
        .sidebar-header .icon-btn svg { width: 18px; height: 18px; }

        .tag-dropdown-container { position: relative; display: inline-block; }
        .tag-dropdown {
            position: absolute; top: 100%; left: 0; margin-top: 8px; background-color: var(--bg-header);
            border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; width: 260px;
            z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none; flex-direction: column; gap: 8px;
        }
        .tag-dropdown.visible { display: flex; }
        .tag-input-row { display: flex; gap: 4px; }
        .tag-input-row input { flex: 1; background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-primary); padding: 6px 8px; border-radius: 4px; outline: none; font-size: 13px; }
        .tag-input-row input:focus { border-color: var(--accent); }
        .tag-input-row button { background: var(--accent); color: #ffffff; border: none; border-radius: 4px; width: 28px; cursor: pointer; font-weight: bold; }
        .tag-list-ui { list-style: none; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
        .tag-list-ui li {
            display: flex; justify-content: space-between; align-items: center; padding: 6px 8px;
            border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--text-primary);
        }
        .tag-list-ui li:hover { background-color: var(--item-hover); }
        .tag-list-ui li.applied { color: var(--accent); font-weight: 500; background-color: rgba(122, 60, 232, 0.1); }
        .tag-list-ui .delete-tag-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; opacity: 0; }
        .tag-list-ui li:hover .delete-tag-btn { opacity: 1; }
        .tag-list-ui .delete-tag-btn:hover { color: var(--danger); background: rgba(255, 76, 76, 0.1); }

        #note-content { flex: 1; padding: 24px 32px; font-size: 15px; line-height: 1.6; outline: none; overflow-y: auto; color: var(--text-primary); }
        #note-content:empty:before { content: attr(data-placeholder); color: var(--text-secondary); pointer-events: none; display: block; }
        #note-content h1, #note-content h2, #note-content h3 { margin-top: 24px; margin-bottom: 12px; font-weight: 600; }
        #note-content h1:first-child, #note-content h2:first-child { margin-top: 0; }
        #note-content h1 { font-size: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        #note-content h2 { font-size: 20px; }
        #note-content p { margin-bottom: 12px; }
        #note-content a { color: var(--accent); text-decoration: none; cursor: pointer; }
        #note-content a:hover { text-decoration: underline; }
        #note-content ul, #note-content ol { margin-bottom: 16px; padding-left: 24px; }
        #note-content li { margin-bottom: 4px; }
        #note-content blockquote { border-left: 4px solid var(--accent); padding-left: 16px; color: var(--text-secondary); margin-bottom: 16px; background-color: rgba(255, 255, 255, 0.03); padding-top: 8px; padding-bottom: 8px; border-radius: 0 4px 4px 0; }
        #note-content code { background-color: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace; font-size: 13.5px; border: 1px solid var(--border-color); }

        .icon-btn { background: transparent; border: none; cursor: pointer; color: var(--text-primary); display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 4px; transition: background-color 0.1s; }
        .icon-btn:hover { background-color: var(--item-hover); }
        .icon-btn svg { width: 16px; height: 16px; stroke-width: 1.5; }

        .link-popup {
            position: absolute;
            z-index: 200;
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            width: 260px;
        }
        .link-popup.visible { display: flex; }
        .link-popup input {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .link-popup input:focus { border-color: var(--accent); }
        .link-popup-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .link-popup-actions button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
        }
        .link-popup-actions button.cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Notes</h2>
                <div class="sidebar-header-actions">
                    <button id="bulk-mode-btn" class="icon-btn" title="Select Multiple / Bulk Export">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 11 12 14 22 4"></polyline>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                    </button>
                    <button id="add-note-btn" class="icon-btn" title="New Note (Cmd/Ctrl + Alt + N)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <ul id="notes-list" class="notes-list"></ul>

            <div class="bulk-footer">
                <button id="cancel-bulk-btn" class="bulk-btn bulk-btn-secondary">Cancel</button>
            </div>

            <div class="auth-footer">
                <button id="login-btn" class="auth-btn">Login to Sync</button>
            </div>
        </aside>

        <main class="editor-container">
            <header class="editor-header">
                <button id="toggle-sidebar-btn" class="icon-btn" title="Toggle Menu (Cmd/Ctrl + /)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <input type="text" id="note-title" placeholder="File name" autocomplete="off">
                
                <div style="flex: 1"></div>

                <button id="export-single-btn" class="icon-btn" title="Export Current Note / Export Selected">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>

                <button id="delete-note-btn" class="icon-btn" title="Delete Note (Cmd/Ctrl + Backspace)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </header>
            
            <div class="editor-body">
                <div class="format-toolbar">
                    <button class="icon-btn format-btn" data-command="bold" title="Bold (Cmd/Ctrl + B)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                    </button>
                    <button class="icon-btn format-btn" data-command="italic" title="Italic (Cmd/Ctrl + I)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                    </button>
                    <button class="icon-btn format-btn" data-command="strikeThrough" title="Strikethrough">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H9a3 3 0 0 0-2.83 4"></path><path d="M14 12a4 4 0 0 1 0 8H6"></path><line x1="4" y1="12" x2="20" y2="12"></line></svg>
                    </button>
                    <div style="width: 1px; background: var(--border-color); margin: 4px 6px;"></div>
                    <button class="icon-btn format-btn" data-command="formatBlock" data-value="H2" title="Heading">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M4 18V6M20 18V6"></path></svg>
                    </button>
                    <button class="icon-btn format-btn" data-command="formatBlock" data-value="BLOCKQUOTE" title="Quote">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"></path><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"></path></svg>
                    </button>
                    <div style="width: 1px; background: var(--border-color); margin: 4px 6px;"></div>
                    <button class="icon-btn format-btn" data-command="createLink" title="Link (Cmd/Ctrl + K)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    </button>
                    <button class="icon-btn format-btn" data-command="insertUnorderedList" title="Bulleted List">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    </button>
                    <div style="width: 1px; background: var(--border-color); margin: 4px 6px;"></div>
                    
                    <div class="tag-dropdown-container">
                        <button id="tag-menu-btn" class="icon-btn" title="Manage Tags">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                <line x1="7" y1="7" x2="7.01" y2="7"></line>
                            </svg>
                        </button>
                        <div id="tag-dropdown" class="tag-dropdown">
                            <div class="tag-input-row">
                                <input type="text" id="new-tag-input" placeholder="Add new tag...">
                                <button id="add-tag-submit">+</button>
                            </div>
                            <ul id="tag-list-ui" class="tag-list-ui"></ul>
                        </div>
                    </div>
                </div>
                
                <div id="note-content" contenteditable="true" data-placeholder="Start typing..."></div>
            </div>
        </main>
    </div>

    <!-- Custom Link Popup -->
    <div id="link-popup" class="link-popup">
        <input type="text" id="link-text-input" placeholder="Link text">
        <input type="text" id="link-url-input" placeholder="URL (https://...)">
        <div class="link-popup-actions">
            <button id="insert-link-btn">Insert</button>
            <button id="cancel-link-btn" class="cancel">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKLsyLuK6q8dgnj5TqyjE-OjxaifDjHCk",
            authDomain: "notepad-eac9c.firebaseapp.com",
            projectId: "notepad-eac9c",
            storageBucket: "notepad-eac9c.firebasestorage.app",
            messagingSenderId: "424898863567",
            appId: "1:424898863567:web:1362a445da057cbf1ef2ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const notesListEl = document.getElementById('notes-list');
            const toggleSidebarBtn = document.getElementById('toggle-sidebar-btn');
            const addNoteBtn = document.getElementById('add-note-btn');
            const deleteNoteBtn = document.getElementById('delete-note-btn');
            const noteTitleInput = document.getElementById('note-title');
            const noteContentEl = document.getElementById('note-content');
            const formatBtns = document.querySelectorAll('.format-btn');
            const exportSingleBtn = document.getElementById('export-single-btn');
            const bulkModeBtn = document.getElementById('bulk-mode-btn');
            const cancelBulkBtn = document.getElementById('cancel-bulk-btn');
            const loginBtn = document.getElementById('login-btn');
            const tagMenuBtn = document.getElementById('tag-menu-btn');
            const tagDropdown = document.getElementById('tag-dropdown');
            const tagListUI = document.getElementById('tag-list-ui');
            const newTagInput = document.getElementById('new-tag-input');
            const addTagSubmit = document.getElementById('add-tag-submit');

            // Link popup elements
            const linkPopup = document.getElementById('link-popup');
            const linkTextInput = document.getElementById('link-text-input');
            const linkUrlInput = document.getElementById('link-url-input');
            const insertLinkBtn = document.getElementById('insert-link-btn');
            const cancelLinkBtn = document.getElementById('cancel-link-btn');

            let notes = JSON.parse(localStorage.getItem('win11_richtext_notes')) || [];
            let globalTags = JSON.parse(localStorage.getItem('win11_richtext_global_tags')) || [
                'Content/Characters','Content/Dialogues','Content/Funny-Words','Content/Names','Content/Posts',
                'Content/Quirks','Content/Scenes','Content/Signature-Dialogues','Content/Topics','General/Marketing',
                'General/Editing','General/Important','General/Improvement-Corrections','General/Life-Lessions',
                'General/Music-Sources','General/Read-Later','General/Script-Writing','General/Strategy',
                'General/Things-I-Love-Doing','General/Thumbnail-Title','General/Tips'
            ];
            let activeNoteId = null;
            let isBulkMode = false;
            let selectedNotesMap = {};
            let syncTimeoutId = null;
            let unsubscribeSnapshot = null;
            let lastKeyWasEnter = false;

            // Saved selection for link insertion
            let savedRange = null;

            // ---------- Tags Logic ----------
            tagMenuBtn.addEventListener('click', (e) => {
                e.preventDefault();
                tagDropdown.classList.toggle('visible');
                if (tagDropdown.classList.contains('visible')) {
                    renderTagDropdown();
                    newTagInput.focus();
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.tag-dropdown-container')) {
                    tagDropdown.classList.remove('visible');
                }
            });

            function renderTagDropdown() {
                tagListUI.innerHTML = '';
                const activeNote = notes.find(n => n.id === activeNoteId);
                const activeNoteTags = activeNote?.tags || [];

                globalTags.forEach(tag => {
                    const li = document.createElement('li');
                    const isApplied = activeNoteTags.includes(tag);
                    if (isApplied) li.classList.add('applied');
                    li.innerHTML = `
                        <span class="tag-name" style="flex:1;">${isApplied ? '✓ ' : ''}${tag}</span>
                        <button class="delete-tag-btn" title="Delete tag globally">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    `;
                    li.querySelector('.tag-name').addEventListener('click', () => {
                        if (!activeNote) return;
                        if (!activeNote.tags) activeNote.tags = [];
                        if (isApplied) activeNote.tags = activeNote.tags.filter(t => t !== tag);
                        else activeNote.tags.push(tag);
                        saveToStorage(); 
                        renderTagDropdown(); 
                    });
                    li.querySelector('.delete-tag-btn').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`Delete the tag "${tag}" from ALL notes?`)) {
                            globalTags = globalTags.filter(t => t !== tag);
                            localStorage.setItem('win11_richtext_global_tags', JSON.stringify(globalTags));
                            notes.forEach(n => {
                                if (n.tags && n.tags.includes(tag)) {
                                    n.tags = n.tags.filter(t => t !== tag);
                                    debouncedCloudSave(n, 0); 
                                }
                            });
                            saveToStorage();
                            renderTagDropdown();
                        }
                    });
                    tagListUI.appendChild(li);
                });
            }

            addTagSubmit.addEventListener('click', () => {
                const val = newTagInput.value.trim();
                if (val && !globalTags.includes(val)) {
                    globalTags.push(val);
                    localStorage.setItem('win11_richtext_global_tags', JSON.stringify(globalTags));
                    newTagInput.value = '';
                    renderTagDropdown();
                }
            });

            newTagInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addTagSubmit.click();
            });

            // ---------- Firebase Sync ----------
            function debouncedCloudSave(note, delay = 1000) {
                if (!auth.currentUser) return; 
                clearTimeout(syncTimeoutId);
                syncTimeoutId = setTimeout(async () => {
                    try {
                        const noteRef = doc(db, "users", auth.currentUser.uid, "notes", note.id);
                        await setDoc(noteRef, note);
                        console.log("Auto-saved to cloud");
                    } catch (e) { console.error("Error saving to cloud:", e); }
                }, delay); 
            }

            function listenToCloud() {
                if (!auth.currentUser) return;
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                const notesRef = collection(db, "users", auth.currentUser.uid, "notes");
                unsubscribeSnapshot = onSnapshot(notesRef, (querySnapshot) => {
                    if (querySnapshot.metadata.hasPendingWrites) return; 
                    const cloudNotes = [];
                    querySnapshot.forEach((doc) => cloudNotes.push(doc.data()));
                    if (cloudNotes.length > 0) {
                        notes = cloudNotes.sort((a, b) => b.timestamp - a.timestamp);
                        localStorage.setItem('win11_richtext_notes', JSON.stringify(notes));
                        renderNotesList();
                        const activeCloudNote = notes.find(n => n.id === activeNoteId);
                        if (!activeCloudNote) {
                            activeNoteId = notes[0].id;
                            loadActiveNote();
                        } else if (noteContentEl.innerHTML !== activeCloudNote.content || noteTitleInput.value !== activeCloudNote.title) {
                            loadActiveNote();
                        }
                    } else {
                        notes = [];
                        renderNotesList();
                    }
                }, (error) => console.error("Real-time sync error:", error));
            }

            async function deleteFromCloud(noteId) {
                if (!auth.currentUser) return;
                try { await deleteDoc(doc(db, "users", auth.currentUser.uid, "notes", noteId)); }
                catch (e) { console.error("Error deleting from cloud:", e); }
            }

            // ---------- Auth ----------
            loginBtn.addEventListener('click', async () => {
                if (auth.currentUser) {
                    alert("Already logged in as: " + auth.currentUser.email);
                    return;
                }
                const email = prompt("Enter Firebase Email:");
                const password = prompt("Enter Firebase Password:");
                if (email && password) {
                    try {
                        await signInWithEmailAndPassword(auth, email, password);
                        alert("Logged in successfully! Activating real-time sync...");
                    } catch (error) { alert("Login failed: " + error.message); }
                }
            });

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    loginBtn.textContent = "Synced with Cloud";
                    loginBtn.style.color = "#7a3ce8";
                    listenToCloud(); 
                }
            });

            // ---------- Core Note Functions ----------
            function init() {
                if (notes.length === 0) createNewNote();
                else {
                    activeNoteId = notes[0].id;
                    renderNotesList();
                    loadActiveNote();
                }
            }

            function saveToStorage() {
                localStorage.setItem('win11_richtext_notes', JSON.stringify(notes));
                renderNotesList();
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (activeNote) debouncedCloudSave(activeNote);
            }

            function createNewNote() {
                const newNote = { id: Date.now().toString(), title: '', content: '', timestamp: Date.now(), tags: [] };
                notes.unshift(newNote);
                activeNoteId = newNote.id;
                saveToStorage();
                loadActiveNote();
                noteContentEl.focus();
            }

            function loadActiveNote() {
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (activeNote) {
                    noteTitleInput.value = activeNote.title;
                    noteContentEl.innerHTML = activeNote.content;
                    noteTitleInput.disabled = false;
                    noteContentEl.contentEditable = "true";
                } else {
                    noteTitleInput.value = '';
                    noteContentEl.innerHTML = '';
                    noteTitleInput.disabled = true;
                    noteContentEl.contentEditable = "false";
                }
            }

            function updateActiveNote() {
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (activeNote) {
                    activeNote.title = noteTitleInput.value;
                    activeNote.content = noteContentEl.innerHTML;
                    activeNote.timestamp = Date.now();
                    saveToStorage();
                }
            }

            function deleteActiveNote() {
                if (!activeNoteId) return;
                deleteFromCloud(activeNoteId);
                notes = notes.filter(n => n.id !== activeNoteId);
                activeNoteId = notes.length > 0 ? notes[0].id : null;
                saveToStorage();
                activeNoteId ? loadActiveNote() : createNewNote(); 
            }

            function extractText(html) {
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || '';
            }

            function renderNotesList() {
                notesListEl.innerHTML = '';
                const sortedNotes = [...notes].sort((a, b) => b.timestamp - a.timestamp);

                sortedNotes.forEach(note => {
                    const li = document.createElement('li');
                    li.className = note.id === activeNoteId ? 'active' : '';
                    const titleText = note.title.trim() || 'Untitled';
                    const previewText = extractText(note.content).trim() || 'Empty note';
                    const isChecked = selectedNotesMap[note.id] ? 'checked' : '';
                    const tagsHtml = (note.tags || []).map(t => `<span class="tag-badge">${t}</span>`).join('');

                    li.innerHTML = `
                        <input type="checkbox" class="note-checkbox" data-id="${note.id}" ${isChecked}>
                        <div class="note-item-info">
                            <div class="note-item-title">${titleText}</div>
                            <div class="note-item-preview">${previewText}</div>
                            ${tagsHtml ? `<div class="note-item-tags">${tagsHtml}</div>` : ''}
                        </div>
                    `;
                    
                    li.addEventListener('click', (e) => {
                        const checkbox = li.querySelector('.note-checkbox');
                        if (isBulkMode) {
                            if (e.target !== checkbox) checkbox.checked = !checkbox.checked;
                            selectedNotesMap[note.id] = checkbox.checked;
                        } else {
                            if (e.target === checkbox) return;
                            activeNoteId = note.id;
                            renderNotesList();
                            loadActiveNote();
                        }
                    });
                    
                    notesListEl.appendChild(li);
                });
            }

            // ---------- Export ----------
            function convertHtmlToMarkdown(html) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;

                tempDiv.querySelectorAll('a').forEach(a => a.replaceWith(`[${a.textContent}](${a.getAttribute('href') || '#'})`));
                tempDiv.querySelectorAll('b, strong').forEach(b => b.replaceWith(`**${b.textContent}**`));
                tempDiv.querySelectorAll('i, em').forEach(i => i.replaceWith(`*${i.textContent}*`));
                tempDiv.querySelectorAll('strike, s, del').forEach(s => s.replaceWith(`~~${s.textContent}~~`));
                tempDiv.querySelectorAll('code').forEach(c => c.replaceWith(`\`${c.textContent}\``));
                tempDiv.querySelectorAll('h1').forEach(h => h.replaceWith(`\n# ${h.textContent}\n`));
                tempDiv.querySelectorAll('h2').forEach(h => h.replaceWith(`\n## ${h.textContent}\n`));
                tempDiv.querySelectorAll('h3').forEach(h => h.replaceWith(`\n### ${h.textContent}\n`));
                tempDiv.querySelectorAll('blockquote').forEach(q => q.replaceWith(`\n> ${q.textContent}\n`));

                tempDiv.querySelectorAll('ul').forEach(ul => {
                    ul.querySelectorAll('li').forEach(li => li.innerHTML = `- ${li.textContent}`);
                });
                tempDiv.querySelectorAll('ol').forEach(ol => {
                    let idx = 1;
                    ol.querySelectorAll('li').forEach(li => li.innerHTML = `${idx++}. ${li.textContent}`);
                });

                let markdown = tempDiv.innerHTML
                    .replace(/<li[^>]*>/g, '')
                    .replace(/<\/li>/g, '\n')
                    .replace(/<ul[^>]*>|<\/ul>|<ol[^>]*>|<\/ol>/g, '\n')
                    .replace(/<p[^>]*>/g, '')
                    .replace(/<\/p>/g, '\n\n')
                    .replace(/<div[^>]*>/g, '')
                    .replace(/<\/div>/g, '\n')
                    .replace(/<br\s*\/?>/g, '\n');

                const decoder = document.createElement('textarea');
                decoder.innerHTML = markdown;
                markdown = decoder.value;

                return markdown.replace(/\n{3,}/g, '\n\n').trim();
            }

            function downloadMarkdownFile(title, htmlContent, tagsArray = []) {
                const markdownText = convertHtmlToMarkdown(htmlContent);
                const filename = (title.trim() || 'Untitled') + '.md';
                let finalExportText = markdownText;
                if (tagsArray && tagsArray.length > 0) {
                    const yamlTags = tagsArray.map(tag => `  - ${tag}`).join('\n');
                    const frontmatter = `---\ntags:\n${yamlTags}\n---\n\n`;
                    finalExportText = frontmatter + markdownText;
                }
                const blob = new Blob([finalExportText], { type: 'text/markdown;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.setAttribute('download', filename);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            function triggerBulkExport() {
                const targetIds = Object.keys(selectedNotesMap).filter(id => selectedNotesMap[id]);
                if (targetIds.length === 0) {
                    alert('Please select at least one note to export.');
                    return;
                }
                targetIds.forEach((id, index) => {
                    const targetNote = notes.find(n => n.id === id);
                    if (targetNote) {
                        setTimeout(() => {
                            downloadMarkdownFile(targetNote.title, targetNote.content, targetNote.tags);
                        }, index * 150);
                    }
                });
                exitBulkMode();
            }

            function enterBulkMode() {
                isBulkMode = true;
                selectedNotesMap = {};
                sidebar.classList.add('bulk-mode');
                renderNotesList();
            }

            function exitBulkMode() {
                isBulkMode = false;
                selectedNotesMap = {};
                sidebar.classList.remove('bulk-mode');
                renderNotesList();
            }

            // ---------- Toolbar Active State ----------
            function updateToolbarState() {
                formatBtns.forEach(btn => {
                    const command = btn.getAttribute('data-command');
                    let isActive = false;
                    if (command === 'bold') isActive = document.queryCommandState('bold');
                    else if (command === 'italic') isActive = document.queryCommandState('italic');
                    else if (command === 'strikeThrough') isActive = document.queryCommandState('strikeThrough');
                    else if (command === 'insertUnorderedList') isActive = document.queryCommandState('insertUnorderedList');
                    else if (command === 'formatBlock') {
                        const value = btn.getAttribute('data-value') || '';
                        const currentFormat = document.queryCommandValue('formatBlock');
                        isActive = (currentFormat && currentFormat.toLowerCase() === value.toLowerCase());
                    }
                    if (isActive) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }

            document.addEventListener('selectionchange', () => {
                if (document.activeElement === noteContentEl) {
                    updateToolbarState();
                }
            });

            // ---------- Event Listeners ----------
            toggleSidebarBtn.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
            addNoteBtn.addEventListener('click', createNewNote);
            deleteNoteBtn.addEventListener('click', deleteActiveNote);
            noteTitleInput.addEventListener('input', updateActiveNote);
            noteContentEl.addEventListener('input', updateActiveNote);

            // Export button (single or bulk)
            exportSingleBtn.addEventListener('click', () => {
                if (isBulkMode) {
                    triggerBulkExport();
                } else {
                    const activeNote = notes.find(n => n.id === activeNoteId);
                    if (activeNote) downloadMarkdownFile(activeNote.title, activeNote.content, activeNote.tags);
                }
            });

            bulkModeBtn.addEventListener('click', () => {
                if (isBulkMode) exitBulkMode(); else enterBulkMode();
            });
            cancelBulkBtn.addEventListener('click', exitBulkMode);

            // Formatting toolbar (except link, handled separately)
            formatBtns.forEach(btn => {
                if (btn.getAttribute('data-command') === 'createLink') return;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const command = btn.getAttribute('data-command');
                    let value = btn.getAttribute('data-value') || null;

                    if (command === 'formatBlock') {
                        const currentFormat = document.queryCommandValue('formatBlock');
                        if (currentFormat && currentFormat.toLowerCase() === value.toLowerCase()) {
                            value = 'DIV'; 
                        }
                    }

                    document.execCommand(command, false, value);
                    updateActiveNote();
                    noteContentEl.focus();
                    updateToolbarState();
                });
            });

            // ---------- Custom Link Popup (Fixed) ----------
            function saveCurrentSelection() {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && noteContentEl.contains(sel.anchorNode)) {
                    savedRange = sel.getRangeAt(0).cloneRange();
                } else {
                    savedRange = null;
                }
            }

            function restoreSelection() {
                if (savedRange) {
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(savedRange);
                } else {
                    // Fallback: focus editor
                    noteContentEl.focus();
                }
            }

            function showLinkPopup() {
                saveCurrentSelection(); // save the current editor selection
                const sel = window.getSelection();
                // Pre-fill text with any selected text in the editor
                if (savedRange && !savedRange.collapsed) {
                    linkTextInput.value = savedRange.toString();
                } else {
                    linkTextInput.value = '';
                }
                linkUrlInput.value = '';
                // Position near the link button
                const linkBtn = document.querySelector('[data-command="createLink"]');
                const rect = linkBtn.getBoundingClientRect();
                linkPopup.style.top = (rect.bottom + 8) + 'px';
                linkPopup.style.left = (rect.left) + 'px';
                linkPopup.classList.add('visible');
                setTimeout(() => linkTextInput.focus(), 50);
            }

            function hideLinkPopup() {
                linkPopup.classList.remove('visible');
            }

            function insertLink() {
                const url = linkUrlInput.value.trim();
                const text = linkTextInput.value.trim();
                if (!url || !text) {
                    alert('Please enter both link text and URL.');
                    return;
                }

                // Restore the saved editor selection
                restoreSelection();
                const sel = window.getSelection();
                if (sel.rangeCount) {
                    const range = sel.getRangeAt(0);
                    // If there's a selection, delete it and insert new link
                    range.deleteContents();
                    const link = document.createElement('a');
                    link.href = url;
                    link.textContent = text;
                    range.insertNode(link);
                    // Move cursor after the link
                    range.setStartAfter(link);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                } else {
                    // Fallback: insert HTML
                    noteContentEl.focus();
                    document.execCommand('insertHTML', false, `<a href="${url}">${text}</a>`);
                }
                updateActiveNote();
                hideLinkPopup();
                noteContentEl.focus();
            }

            // Link button click
            document.querySelector('[data-command="createLink"]').addEventListener('click', (e) => {
                e.preventDefault();
                if (linkPopup.classList.contains('visible')) {
                    hideLinkPopup();
                } else {
                    showLinkPopup();
                }
            });

            insertLinkBtn.addEventListener('click', insertLink);
            cancelLinkBtn.addEventListener('click', hideLinkPopup);

            document.addEventListener('click', (e) => {
                if (linkPopup.classList.contains('visible') && !e.target.closest('#link-popup') && !e.target.closest('[data-command="createLink"]')) {
                    hideLinkPopup();
                }
            });

            linkTextInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    linkUrlInput.focus();
                }
            });
            linkUrlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    insertLink();
                }
            });

            // ---------- Blockquote Helpers & Keyboard ----------
            function getBlockquoteAncestor() {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                let node = sel.anchorNode;
                while (node && node !== noteContentEl) {
                    if (node.nodeName === 'BLOCKQUOTE') return node;
                    node = node.parentNode;
                }
                return null;
            }

            function getCurrentBlockElement(container) {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                let node = sel.anchorNode;
                while (node && node !== container) {
                    if (/^(P|DIV|H[1-6]|BLOCKQUOTE)$/.test(node.nodeName)) {
                        return node;
                    }
                    node = node.parentNode;
                }
                return null;
            }

            noteContentEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const blockquote = getBlockquoteAncestor();
                    if (blockquote) {
                        e.preventDefault();
                        if (lastKeyWasEnter) {
                            // Double Enter → exit blockquote
                            const sel = window.getSelection();
                            const currentBlock = getCurrentBlockElement(blockquote);
                            if (currentBlock && currentBlock !== blockquote && currentBlock.textContent.trim() === '') {
                                currentBlock.parentNode.removeChild(currentBlock);
                            }
                            const newPara = document.createElement('p');
                            newPara.innerHTML = '<br>';
                            blockquote.parentNode.insertBefore(newPara, blockquote.nextSibling);
                            const range = document.createRange();
                            range.setStart(newPara, 0);
                            range.collapse(true);
                            sel.removeAllRanges();
                            sel.addRange(range);
                            lastKeyWasEnter = false;
                            updateActiveNote();
                        } else {
                            // First Enter → add paragraph inside
                            const sel = window.getSelection();
                            if (sel.rangeCount) {
                                const range = sel.getRangeAt(0);
                                const newPara = document.createElement('p');
                                newPara.innerHTML = '<br>';
                                blockquote.appendChild(newPara);
                                range.setStart(newPara, 0);
                                range.collapse(true);
                                sel.removeAllRanges();
                                sel.addRange(range);
                            }
                            lastKeyWasEnter = true;
                        }
                        return;
                    }
                }

                if (e.key !== 'Enter') lastKeyWasEnter = false;

                if (e.key === 'Tab') {
                    e.preventDefault();
                    if (e.shiftKey) document.execCommand('outdent', false, null);
                    else document.execCommand('indent', false, null);
                }
            });

            noteContentEl.addEventListener('mousedown', () => {
                lastKeyWasEnter = false;
            });

            noteContentEl.addEventListener("paste", function(e) {
                e.preventDefault();
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });

            init();
            updateToolbarState();
        });
    </script>
</body>
