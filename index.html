<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad</title>
    <style>
        :root {
            /* Ultra-Dark Aesthetic Palette */
            --bg-body: #050505;
            --bg-sidebar: #0a0a0a;
            --bg-card: #121212;
            
            --border-color: rgba(255, 255, 255, 0.06);
            --border-highlight: rgba(255, 255, 255, 0.12);
            
            --text-primary: #ededed;
            --text-secondary: #858585;
            
            --item-hover: #161616;
            --item-active: #1c1c1c;
            
            /* Vibrant Blue Accent from Screenshot */
            --accent: #1877f2; 
            --accent-hover: #388cf5;
            --accent-bg: rgba(24, 119, 242, 0.12);
            --accent-glow: 0 0 16px rgba(24, 119, 242, 0.3);
            
            --code-bg: #1a1a1a;
            --danger: #ff453a;
            --danger-bg: rgba(255, 69, 58, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        ::selection {
            background-color: rgba(24, 119, 242, 0.3);
            color: #ffffff;
        }

        body {
            font-family: "Inter", "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            background-color: var(--bg-body);
            /* Subtle radial glow to give depth to the dark background */
            background-image: radial-gradient(circle at 50% 30%, #111116 0%, var(--bg-body) 70%);
        }

        .app-container { 
            display: flex; 
            height: 100%; 
        }

        /* Sleek dark scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background-color: #2a2a2a; 
            border: 3px solid var(--bg-body); 
            border-radius: 8px; 
        }
        ::-webkit-scrollbar-thumb:hover { background-color: #444; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .sidebar.collapsed { margin-left: -280px; }

        .sidebar-header { 
            padding: 16px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .sidebar-header-actions { display: flex; gap: 6px; }

        .notes-list {
            list-style: none; overflow-y: auto; flex: 1; padding: 0 12px 12px 12px;
            position: relative;
        }
        .notes-list li {
            padding: 10px 14px; margin-bottom: 4px; cursor: pointer; border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.15s ease;
            display: flex; gap: 10px;
            user-select: none;
            background-color: transparent;
        }
        .notes-list li:hover { 
            background-color: var(--item-hover); 
        }
        .notes-list li.active { 
            background-color: var(--item-active); 
        }
        .notes-list li.selected {
            background-color: var(--accent-bg);
            border-color: rgba(24, 119, 242, 0.3);
        }
        .notes-list li.active.selected {
            background-color: var(--accent-bg);
            border-color: var(--accent);
        }

        .note-item-info { flex: 1; min-width: 0; }
        .note-item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .note-item-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .note-item-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .tag-badge { 
            font-size: 10px; 
            background-color: #1a1a1a; 
            color: var(--text-secondary); 
            padding: 3px 8px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color);
        }
        .notes-list li.active .tag-badge { 
            border-color: rgba(24, 119, 242, 0.4); 
            color: var(--accent); 
            background: var(--accent-bg); 
        }

        .auth-footer { 
            padding: 16px; 
            background-color: var(--bg-sidebar); 
            border-top: 1px solid var(--border-color); 
        }
        .auth-btn { 
            width: 100%; padding: 10px; background: transparent; 
            border: 1px solid var(--border-color); color: var(--text-primary); 
            border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; 
            transition: all 0.2s ease; 
        }
        .auth-btn:hover { 
            background: #1a1a1a; 
            border-color: var(--border-highlight); 
        }

        /* Main Container */
        .editor-container { 
            flex: 1; display: flex; flex-direction: column; min-width: 0; 
            background-color: transparent; 
        }
        
        .editor-header { 
            padding: 12px 24px; 
            background-color: transparent; 
            display: flex; align-items: center; gap: 16px; height: 64px; 
        }
        
        #note-title { 
            flex: 1; font-size: 18px; font-weight: 500; border: none; outline: none; 
            background: transparent; color: var(--text-primary); font-family: inherit; 
            padding: 4px 0;
        }
        #note-title::placeholder { color: var(--text-secondary); }

        /* Centralized Editor Area */
        .editor-body { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            overflow-y: auto; 
            padding: 20px 32px 0 32px; 
        }

        .editor-center-card {
            position: relative; /* Essential for absolute positioned resizers */
            width: 100%;
            max-width: 840px; /* Default width, will be overridden by JS if changed */
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            min-height: 85vh; 
            margin-bottom: 60px; /* Space underneath the card */
        }

        /* Custom edge resizers */
        .card-resizer {
            position: absolute;
            top: 0; 
            bottom: 0;
            width: 12px;
            cursor: ew-resize;
            z-index: 10;
            background-color: transparent;
            transition: background-color 0.2s ease;
            border-radius: 4px;
        }
        .card-resizer:hover, .card-resizer.active {
            background-color: rgba(24, 119, 242, 0.3);
        }
        .card-resizer.left-edge { left: -6px; }
        .card-resizer.right-edge { right: -6px; }

        .format-toolbar {
            display: flex; gap: 6px; padding: 12px 24px; border-bottom: 1px solid var(--border-color);
            align-items: center;
            
            /* Sticky Positioning */
            position: sticky;
            top: 0;
            z-index: 40;
            
            /* Frosted glass so text elegantly blurs underneath */
            background-color: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            
            /* Hugs the outer container's rounded corners */
            border-top-left-radius: 11px; 
            border-top-right-radius: 11px;
        }
        
        .icon-btn { 
            background: transparent; border: 1px solid transparent; cursor: pointer; 
            color: var(--text-secondary); display: flex; align-items: center; justify-content: center; 
            width: 32px; height: 32px; border-radius: 6px; 
            transition: all 0.15s ease; 
        }
        .icon-btn:hover { 
            background-color: rgba(255, 255, 255, 0.08); 
            color: var(--text-primary);
        }
        .icon-btn.active { 
            color: var(--accent); 
            background-color: var(--accent-bg); 
        }
        .icon-btn svg { width: 16px; height: 16px; stroke-width: 1.7; }

        .tag-dropdown-container { position: relative; display: inline-block; margin-left: auto; }
        
        /* Dark Theme Popups */
        .tag-dropdown, .link-popup, .image-popup {
            position: absolute; 
            background: #141414;
            border: 1px solid var(--border-highlight); 
            border-radius: 8px; padding: 16px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6); 
            display: none; flex-direction: column; gap: 12px;
            z-index: 200;
        }
        
        .tag-dropdown { top: 100%; right: 0; margin-top: 8px; width: 280px; }
        .tag-dropdown.visible { display: flex; animation: flyIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes flyIn {
            from { opacity: 0; transform: translateY(-4px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tag-input-row { display: flex; gap: 8px; }
        
        input[type="text"] { 
            flex: 1; 
            background: #0a0a0a; 
            border: 1px solid var(--border-color); 
            color: var(--text-primary); 
            padding: 8px 12px; 
            border-radius: 6px; outline: none; font-size: 13px; 
            transition: all 0.2s ease;
        }
        input[type="text"]:focus { 
            border-color: var(--accent); 
        }
        
        .tag-input-row button, #insert-link-btn, #insert-image-btn { 
            background: var(--accent); 
            color: #ffffff; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 500; 
            transition: all 0.2s;
            box-shadow: var(--accent-glow);
        }
        .tag-input-row button { width: 32px; font-weight: bold; }
        .tag-input-row button:hover, #insert-link-btn:hover, #insert-image-btn:hover { 
            background: var(--accent-hover); 
        }
        
        .tag-list-ui { list-style: none; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
        .tag-list-ui li {
            display: flex; justify-content: space-between; align-items: center; padding: 8px 10px;
            border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-primary);
            transition: background 0.1s;
        }
        .tag-list-ui li:hover { background-color: var(--item-hover); }
        .tag-list-ui li.applied { color: var(--accent); font-weight: 500; background-color: var(--accent-bg); }
        .tag-list-ui .delete-tag-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.2s; }
        .tag-list-ui li:hover .delete-tag-btn { opacity: 1; }
        .tag-list-ui .delete-tag-btn:hover { color: var(--danger); background: var(--danger-bg); }

        #note-content { 
            flex: 1; 
            /* Fixed 500px provides exactly ~20 blank lines at the bottom */
            padding: 32px 48px 500px 48px; 
            font-size: 15px; line-height: 1.7; 
            outline: none; color: var(--text-primary); 
        }
        #note-content:empty:before { content: attr(data-placeholder); color: var(--text-secondary); pointer-events: none; display: block; }
        #note-content h1, #note-content h2, #note-content h3 { margin-top: 28px; margin-bottom: 14px; font-weight: 600; letter-spacing: -0.02em; }
        #note-content h1:first-child, #note-content h2:first-child { margin-top: 0; }
        #note-content h1 { font-size: 26px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        #note-content h2 { font-size: 20px; }
        #note-content p { margin-bottom: 14px; }
        #note-content a { color: var(--accent); text-decoration: none; cursor: pointer; transition: color 0.2s; }
        #note-content a:hover { text-decoration: underline; color: var(--accent-hover); }
        #note-content ul, #note-content ol { margin-bottom: 18px; padding-left: 28px; }
        #note-content li { margin-bottom: 6px; }
        #note-content blockquote { 
            border-left: 3px solid var(--accent); 
            padding-left: 18px; color: var(--text-secondary); 
            margin-bottom: 18px; background-color: #161616; 
            padding-top: 10px; padding-bottom: 10px; border-radius: 0 6px 6px 0; 
        }
        #note-content code { 
            background-color: var(--code-bg); padding: 3px 6px; 
            border-radius: 4px; font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace; 
            font-size: 13.5px; border: 1px solid var(--border-color); 
        }

        /* Image resizing wrapper */
        .img-resize-container {
            position: relative;
            display: inline-block;
            user-select: none;
            vertical-align: middle;
            overflow: hidden;
            border-radius: 6px;
        }
        .img-resize-container img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .img-resize-container .resize-handle {
            position: absolute;
            width: 14px;
            height: 14px;
            bottom: 6px;
            right: 6px;
            background: var(--accent);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: nwse-resize;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .img-resize-container:hover .resize-handle {
            opacity: 1;
        }

        .link-popup, .image-popup { width: 300px; }
        .link-popup.visible, .image-popup.visible { display: flex; animation: flyIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .link-popup-actions, .image-popup-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
        .link-popup-actions button, .image-popup-actions button {
            padding: 8px 16px;
            font-size: 13px;
        }
        .link-popup-actions button.cancel, .image-popup-actions button.cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: none;
        }
        .link-popup-actions button.cancel:hover, .image-popup-actions button.cancel:hover {
            background: var(--item-hover);
            border-color: var(--border-highlight);
        }
        
        .image-upload-row { display: flex; align-items: center; gap: 10px; }
        .image-upload-row input[type="file"] { display: none; }
        .image-upload-row label {
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .image-upload-row label:hover { background: #222; border-color: var(--border-highlight); }

        /* Rubberband selection overlay */
        #selection-overlay {
            position: absolute;
            border: 1px solid rgba(24, 119, 242, 0.5);
            background-color: rgba(24, 119, 242, 0.15);
            pointer-events: none;
            z-index: 50;
            display: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Notes</h2>
                <div class="sidebar-header-actions">
                    <button id="add-note-btn" class="icon-btn" title="New Note (Cmd/Ctrl + Alt + N)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <ul id="notes-list" class="notes-list"></ul>
            <div id="selection-overlay"></div>

            <div class="auth-footer">
                <button id="login-btn" class="auth-btn">Login to Sync</button>
            </div>
        </aside>

        <main class="editor-container">
            <header class="editor-header">
                <button id="toggle-sidebar-btn" class="icon-btn" title="Toggle Menu (Cmd/Ctrl + /)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <input type="text" id="note-title" placeholder="File name" autocomplete="off">
                
                <div style="flex: 1"></div>

                <button id="export-single-btn" class="icon-btn" title="Export Selected Notes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 5 17 10"></polyline>
                        <line x1="12" y1="5" x2="12" y2="17"></line>
                    </svg>
                </button>

                <button id="delete-note-btn" class="icon-btn" title="Delete Selected Notes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </header>
            
            <div class="editor-body">
                <div class="editor-center-card" id="editor-card">
                    <div class="card-resizer left-edge"></div>
                    <div class="card-resizer right-edge"></div>

                    <div class="format-toolbar">
                        <button class="icon-btn format-btn" data-command="bold" title="Bold (Cmd/Ctrl + B)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                        </button>
                        <button class="icon-btn format-btn" data-command="italic" title="Italic (Cmd/Ctrl + I)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                        </button>
                        <button class="icon-btn format-btn" data-command="strikeThrough" title="Strikethrough">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H9a3 3 0 0 0-2.83 4"></path><path d="M14 12a4 4 0 0 1 0 8H6"></path><line x1="4" y1="12" x2="20" y2="12"></line></svg>
                        </button>
                        <button class="icon-btn format-btn" data-command="formatBlock" data-value="H2" title="Heading">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M4 18V6M20 18V6"></path></svg>
                        </button>
                        <button class="icon-btn format-btn" data-command="formatBlock" data-value="BLOCKQUOTE" title="Quote">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"></path><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"></path></svg>
                        </button>
                        <button class="icon-btn format-btn" data-command="createLink" title="Link (Cmd/Ctrl + K)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        </button>
                        <button class="icon-btn format-btn" data-command="insertImage" title="Insert Image (URL or from device)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </button>
                        <button class="icon-btn format-btn" data-command="insertUnorderedList" title="Bulleted List">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        </button>
                        <div class="tag-dropdown-container">
                            <button id="tag-menu-btn" class="icon-btn" title="Manage Tags">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                    <line x1="7" y1="7" x2="7.01" y2="7"></line>
                                </svg>
                            </button>
                            <div id="tag-dropdown" class="tag-dropdown">
                                <div class="tag-input-row">
                                    <input type="text" id="new-tag-input" placeholder="Add new tag...">
                                    <button id="add-tag-submit">+</button>
                                </div>
                                <ul id="tag-list-ui" class="tag-list-ui"></ul>
                            </div>
                        </div>
                    </div>
                    
                    <div id="note-content" contenteditable="true" data-placeholder="Start typing..."></div>
                </div>
            </div>
        </main>
    </div>

    <div id="link-popup" class="link-popup">
        <input type="text" id="link-text-input" placeholder="Link text">
        <input type="text" id="link-url-input" placeholder="URL (https://...)">
        <div class="link-popup-actions">
            <button id="insert-link-btn">Insert</button>
            <button id="cancel-link-btn" class="cancel">Cancel</button>
        </div>
    </div>

    <div id="image-popup" class="image-popup">
        <input type="text" id="image-url-input" placeholder="Image URL (https://...)">
        <input type="text" id="image-alt-input" placeholder="Alt text (optional)">
        <div class="image-upload-row">
            <input type="file" id="image-file-input" accept="image/*">
            <label for="image-file-input">Choose from device</label>
            <span id="image-file-name" style="color:var(--text-secondary);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;"></span>
        </div>
        <div class="image-popup-actions">
            <button id="insert-image-btn">Insert</button>
            <button id="cancel-image-btn" class="cancel">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKLsyLuK6q8dgnj5TqyjE-OjxaifDjHCk",
            authDomain: "notepad-eac9c.firebaseapp.com",
            projectId: "notepad-eac9c",
            storageBucket: "notepad-eac9c.firebasestorage.app",
            messagingSenderId: "424898863567",
            appId: "1:424898863567:web:1362a445da057cbf1ef2ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            // DOM elements
            const sidebar = document.getElementById('sidebar');
            const notesListEl = document.getElementById('notes-list');
            const toggleSidebarBtn = document.getElementById('toggle-sidebar-btn');
            const addNoteBtn = document.getElementById('add-note-btn');
            const deleteNoteBtn = document.getElementById('delete-note-btn');
            const noteTitleInput = document.getElementById('note-title');
            const noteContentEl = document.getElementById('note-content');
            const formatBtns = document.querySelectorAll('.format-btn');
            const exportSingleBtn = document.getElementById('export-single-btn');
            const loginBtn = document.getElementById('login-btn');
            const tagMenuBtn = document.getElementById('tag-menu-btn');
            const tagDropdown = document.getElementById('tag-dropdown');
            const tagListUI = document.getElementById('tag-list-ui');
            const newTagInput = document.getElementById('new-tag-input');
            const addTagSubmit = document.getElementById('add-tag-submit');

            // Link popup elements
            const linkPopup = document.getElementById('link-popup');
            const linkTextInput = document.getElementById('link-text-input');
            const linkUrlInput = document.getElementById('link-url-input');
            const insertLinkBtn = document.getElementById('insert-link-btn');
            const cancelLinkBtn = document.getElementById('cancel-link-btn');

            // Image popup elements
            const imagePopup = document.getElementById('image-popup');
            const imageUrlInput = document.getElementById('image-url-input');
            const imageAltInput = document.getElementById('image-alt-input');
            const imageFileInput = document.getElementById('image-file-input');
            const imageFileName = document.getElementById('image-file-name');
            const insertImageBtn = document.getElementById('insert-image-btn');
            const cancelImageBtn = document.getElementById('cancel-image-btn');

            const selectionOverlay = document.getElementById('selection-overlay');

            // Editor Card Elements
            const editorCard = document.getElementById('editor-card');
            const cardResizers = document.querySelectorAll('.card-resizer');

            // State
            let notes = JSON.parse(localStorage.getItem('win11_richtext_notes')) || [];
            let globalTags = JSON.parse(localStorage.getItem('win11_richtext_global_tags')) || [
                'Content/Characters','Content/Dialogues','Content/Funny-Words','Content/Names','Content/Posts',
                'Content/Quirks','Content/Scenes','Content/Signature-Dialogues','Content/Topics','General/Marketing',
                'General/Editing','General/Important','General/Improvement-Corrections','General/Life-Lessions',
                'General/Music-Sources','General/Read-Later','General/Script-Writing','General/Strategy',
                'General/Things-I-Love-Doing','General/Thumbnail-Title','General/Tips'
            ];
            let activeNoteId = null;
            let selectedIds = new Set();
            let lastClickedId = null;
            let syncTimeoutId = null;
            let unsubscribeSnapshot = null;
            let lastKeyWasEnter = false;
            let savedRange = null;

            // ---------- Editor Card Resizing Logic ----------
            const savedCardWidth = localStorage.getItem('win11_richtext_editor_width');
            if (savedCardWidth) {
                editorCard.style.maxWidth = savedCardWidth + 'px';
                editorCard.style.width = '100%'; 
            }

            let cardResizeState = null;

            cardResizers.forEach(resizer => {
                resizer.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const isLeft = resizer.classList.contains('left-edge');
                    cardResizeState = {
                        startX: e.clientX,
                        startWidth: editorCard.getBoundingClientRect().width,
                        isLeft: isLeft
                    };
                    document.body.style.cursor = 'ew-resize';
                    resizer.classList.add('active');
                });
            });

            document.addEventListener('mousemove', (e) => {
                if (cardResizeState) {
                    const deltaX = e.clientX - cardResizeState.startX;
                    const widthChange = cardResizeState.isLeft ? -deltaX : deltaX;
                    // Multiply by 2 because the card is centered
                    let newWidth = cardResizeState.startWidth + (widthChange * 2);
                    
                    newWidth = Math.max(400, newWidth); // Minimum width constraint
                    newWidth = Math.min(window.innerWidth - 60, newWidth); // Keep inside window
                    
                    editorCard.style.maxWidth = newWidth + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                if (cardResizeState) {
                    document.body.style.cursor = '';
                    cardResizers.forEach(r => r.classList.remove('active'));
                    localStorage.setItem('win11_richtext_editor_width', editorCard.getBoundingClientRect().width);
                    cardResizeState = null;
                }
            });

            // ---------- Dynamic Typewriter Centering ----------
            function enforceTypewriterScroll() {
                // Only trigger if we are actively focused inside the note
                if (document.activeElement !== noteContentEl) return;
                
                const sel = window.getSelection();
                if (!sel.rangeCount) return;

                let caretY;
                const range = sel.getRangeAt(0);
                const rects = range.getClientRects();
                
                // Usually returns a rect if selecting text
                if (rects.length > 0) {
                    caretY = rects[0].top;
                } else {
                    // Fallback for empty lines (like pressing enter on a new paragraph)
                    const marker = document.createElement('span');
                    marker.textContent = '\u200b'; // invisible zero-width space
                    range.insertNode(marker);
                    caretY = marker.getBoundingClientRect().top;
                    marker.parentNode.removeChild(marker);
                }

                if (caretY == null) return;

                const scrollContainer = document.querySelector('.editor-body');
                const containerRect = scrollContainer.getBoundingClientRect();
                
                // If the cursor falls below 65% of the screen height, recenter it
                const threshold = containerRect.top + (containerRect.height * 0.65);
                const centerTarget = containerRect.top + (containerRect.height * 0.5);

                if (caretY > threshold) {
                    const distance = caretY - centerTarget;
                    scrollContainer.scrollBy({ top: distance, behavior: 'smooth' });
                }
            }

            noteContentEl.addEventListener('input', () => {
                updateActiveNote();
                requestAnimationFrame(enforceTypewriterScroll);
            });

            noteContentEl.addEventListener('keyup', (e) => {
                // Check on navigation or enter keys
                if (['ArrowDown', 'ArrowUp', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                    requestAnimationFrame(enforceTypewriterScroll);
                }
            });

            // ---------- Tags Logic ----------
            tagMenuBtn.addEventListener('click', (e) => {
                e.preventDefault();
                tagDropdown.classList.toggle('visible');
                if (tagDropdown.classList.contains('visible')) {
                    renderTagDropdown();
                    newTagInput.focus();
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.tag-dropdown-container')) {
                    tagDropdown.classList.remove('visible');
                }
            });

            function renderTagDropdown() {
                tagListUI.innerHTML = '';
                const activeNote = notes.find(n => n.id === activeNoteId);
                const activeNoteTags = activeNote?.tags || [];

                globalTags.forEach(tag => {
                    const li = document.createElement('li');
                    const isApplied = activeNoteTags.includes(tag);
                    if (isApplied) li.classList.add('applied');
                    li.innerHTML = `
                        <span class="tag-name" style="flex:1;">${isApplied ? '✓ ' : ''}${tag}</span>
                        <button class="delete-tag-btn" title="Delete tag globally">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    `;
                    li.querySelector('.tag-name').addEventListener('click', () => {
                        if (!activeNote) return;
                        if (!activeNote.tags) activeNote.tags = [];
                        if (isApplied) activeNote.tags = activeNote.tags.filter(t => t !== tag);
                        else activeNote.tags.push(tag);
                        saveToStorage(); 
                        renderTagDropdown(); 
                    });
                    li.querySelector('.delete-tag-btn').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`Delete the tag "${tag}" from ALL notes?`)) {
                            globalTags = globalTags.filter(t => t !== tag);
                            localStorage.setItem('win11_richtext_global_tags', JSON.stringify(globalTags));
                            notes.forEach(n => {
                                if (n.tags && n.tags.includes(tag)) {
                                    n.tags = n.tags.filter(t => t !== tag);
                                    debouncedCloudSave(n, 0); 
                                }
                            });
                            saveToStorage();
                            renderTagDropdown();
                        }
                    });
                    tagListUI.appendChild(li);
                });
            }

            addTagSubmit.addEventListener('click', () => {
                const val = newTagInput.value.trim();
                if (val && !globalTags.includes(val)) {
                    globalTags.push(val);
                    localStorage.setItem('win11_richtext_global_tags', JSON.stringify(globalTags));
                    newTagInput.value = '';
                    renderTagDropdown();
                }
            });

            newTagInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addTagSubmit.click();
            });

            // ---------- Firebase Sync ----------
            function debouncedCloudSave(note, delay = 1000) {
                if (!auth.currentUser) return; 
                clearTimeout(syncTimeoutId);
                syncTimeoutId = setTimeout(async () => {
                    try {
                        const noteRef = doc(db, "users", auth.currentUser.uid, "notes", note.id);
                        await setDoc(noteRef, note);
                        console.log("Auto-saved to cloud");
                    } catch (e) { console.error("Error saving to cloud:", e); }
                }, delay); 
            }

            function listenToCloud() {
                if (!auth.currentUser) return;
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                const notesRef = collection(db, "users", auth.currentUser.uid, "notes");
                unsubscribeSnapshot = onSnapshot(notesRef, (querySnapshot) => {
                    if (querySnapshot.metadata.hasPendingWrites) return; 
                    const cloudNotes = [];
                    querySnapshot.forEach((doc) => cloudNotes.push(doc.data()));
                    if (cloudNotes.length > 0) {
                        notes = cloudNotes.sort((a, b) => b.timestamp - a.timestamp);
                        localStorage.setItem('win11_richtext_notes', JSON.stringify(notes));
                        renderNotesList();
                        const activeCloudNote = notes.find(n => n.id === activeNoteId);
                        if (!activeCloudNote) {
                            activeNoteId = notes[0].id;
                            loadActiveNote();
                        } else if (noteContentEl.innerHTML !== activeCloudNote.content || noteTitleInput.value !== activeCloudNote.title) {
                            loadActiveNote();
                        }
                    } else {
                        notes = [];
                        renderNotesList();
                    }
                }, (error) => console.error("Real-time sync error:", error));
            }

            async function deleteFromCloud(noteId) {
                if (!auth.currentUser) return;
                try { await deleteDoc(doc(db, "users", auth.currentUser.uid, "notes", noteId)); }
                catch (e) { console.error("Error deleting from cloud:", e); }
            }

            // ---------- Auth ----------
            loginBtn.addEventListener('click', async () => {
                if (auth.currentUser) {
                    alert("Already logged in as: " + auth.currentUser.email);
                    return;
                }
                const email = prompt("Enter Firebase Email:");
                const password = prompt("Enter Firebase Password:");
                if (email && password) {
                    try {
                        await signInWithEmailAndPassword(auth, email, password);
                        alert("Logged in successfully! Activating real-time sync...");
                    } catch (error) { alert("Login failed: " + error.message); }
                }
            });

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    loginBtn.textContent = "Synced with Cloud";
                    loginBtn.style.color = "var(--accent)";
                    loginBtn.style.borderColor = "var(--accent)";
                    listenToCloud(); 
                }
            });

            // ---------- Core Note Functions ----------
            function init() {
                if (notes.length === 0) createNewNote();
                else {
                    activeNoteId = notes[0].id;
                    selectedIds = new Set([activeNoteId]);
                    lastClickedId = activeNoteId;
                    renderNotesList();
                    loadActiveNote();
                }
            }

            function saveToStorage() {
                localStorage.setItem('win11_richtext_notes', JSON.stringify(notes));
                renderNotesList();
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (activeNote) debouncedCloudSave(activeNote);
            }

            function createNewNote() {
                const newNote = { id: Date.now().toString(), title: '', content: '', timestamp: Date.now(), tags: [] };
                notes.unshift(newNote);
                activeNoteId = newNote.id;
                selectedIds = new Set([activeNoteId]);
                lastClickedId = activeNoteId;
                saveToStorage();
                loadActiveNote();
                noteContentEl.focus();
            }

            function loadActiveNote() {
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (activeNote) {
                    noteTitleInput.value = activeNote.title;
                    noteContentEl.innerHTML = activeNote.content;
                    noteTitleInput.disabled = false;
                    noteContentEl.contentEditable = "true";
                } else {
                    noteTitleInput.value = '';
                    noteContentEl.innerHTML = '';
                    noteTitleInput.disabled = true;
                    noteContentEl.contentEditable = "false";
                }
            }

            function updateActiveNote() {
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (activeNote) {
                    activeNote.title = noteTitleInput.value;
                    activeNote.content = noteContentEl.innerHTML;
                    activeNote.timestamp = Date.now();
                    saveToStorage();
                }
            }

            function getSortedNotes() {
                return [...notes].sort((a, b) => b.timestamp - a.timestamp);
            }

            function deleteNotes(ids) {
                ids.forEach(id => deleteFromCloud(id));
                notes = notes.filter(n => !ids.includes(n.id));
                ids.forEach(id => selectedIds.delete(id));
                if (ids.includes(activeNoteId)) {
                    activeNoteId = notes.length > 0 ? notes[0].id : null;
                    if (activeNoteId) {
                        selectedIds.add(activeNoteId);
                        lastClickedId = activeNoteId;
                    }
                }
                saveToStorage();
                if (activeNoteId) loadActiveNote();
                else createNewNote();
            }

            function extractText(html) {
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || '';
            }

            function renderNotesList() {
                notesListEl.innerHTML = '';
                const sortedNotes = getSortedNotes();

                sortedNotes.forEach(note => {
                    const li = document.createElement('li');
                    li.dataset.id = note.id;
                    li.className = '';
                    if (note.id === activeNoteId) li.classList.add('active');
                    if (selectedIds.has(note.id)) li.classList.add('selected');

                    const titleText = note.title.trim() || 'Untitled';
                    const previewText = extractText(note.content).trim() || 'Empty note';
                    const tagsHtml = (note.tags || []).map(t => `<span class="tag-badge">${t}</span>`).join('');

                    li.innerHTML = `
                        <div class="note-item-info">
                            <div class="note-item-title">${titleText}</div>
                            <div class="note-item-preview">${previewText}</div>
                            ${tagsHtml ? `<div class="note-item-tags">${tagsHtml}</div>` : ''}
                        </div>
                    `;
                    notesListEl.appendChild(li);
                });
            }

            // ---------- Export ----------
            function convertHtmlToMarkdown(html) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;

                tempDiv.querySelectorAll('.img-resize-container img').forEach(img => {
                    const alt = img.getAttribute('alt') || '';
                    const src = img.getAttribute('src') || '';
                    img.replaceWith(`![${alt}](${src})`);
                });
                tempDiv.querySelectorAll('img').forEach(img => {
                    if (img.parentNode) {
                        const alt = img.getAttribute('alt') || '';
                        const src = img.getAttribute('src') || '';
                        img.replaceWith(`![${alt}](${src})`);
                    }
                });

                tempDiv.querySelectorAll('a').forEach(a => a.replaceWith(`[${a.textContent}](${a.getAttribute('href') || '#'})`));
                tempDiv.querySelectorAll('b, strong').forEach(b => b.replaceWith(`**${b.textContent}**`));
                tempDiv.querySelectorAll('i, em').forEach(i => i.replaceWith(`*${i.textContent}*`));
                tempDiv.querySelectorAll('strike, s, del').forEach(s => s.replaceWith(`~~${s.textContent}~~`));
                tempDiv.querySelectorAll('code').forEach(c => c.replaceWith(`\`${c.textContent}\``));
                tempDiv.querySelectorAll('h1').forEach(h => h.replaceWith(`\n# ${h.textContent}\n`));
                tempDiv.querySelectorAll('h2').forEach(h => h.replaceWith(`\n## ${h.textContent}\n`));
                tempDiv.querySelectorAll('h3').forEach(h => h.replaceWith(`\n### ${h.textContent}\n`));
                tempDiv.querySelectorAll('blockquote').forEach(q => q.replaceWith(`\n> ${q.textContent}\n`));

                tempDiv.querySelectorAll('ul').forEach(ul => {
                    ul.querySelectorAll('li').forEach(li => li.innerHTML = `- ${li.textContent}`);
                });
                tempDiv.querySelectorAll('ol').forEach(ol => {
                    let idx = 1;
                    ol.querySelectorAll('li').forEach(li => li.innerHTML = `${idx++}. ${li.textContent}`);
                });

                let markdown = tempDiv.innerHTML
                    .replace(/<li[^>]*>/g, '')
                    .replace(/<\/li>/g, '\n')
                    .replace(/<ul[^>]*>|<\/ul>|<ol[^>]*>|<\/ol>/g, '\n')
                    .replace(/<p[^>]*>/g, '')
                    .replace(/<\/p>/g, '\n\n')
                    .replace(/<div[^>]*>/g, '')
                    .replace(/<\/div>/g, '\n')
                    .replace(/<br\s*\/?>/g, '\n');

                const decoder = document.createElement('textarea');
                decoder.innerHTML = markdown;
                markdown = decoder.value;

                return markdown.replace(/\n{3,}/g, '\n\n').trim();
            }

            function downloadMarkdownFile(title, htmlContent, tagsArray = []) {
                const markdownText = convertHtmlToMarkdown(htmlContent);
                const filename = (title.trim() || 'Untitled') + '.md';
                let finalExportText = markdownText;
                if (tagsArray && tagsArray.length > 0) {
                    const yamlTags = tagsArray.map(tag => `  - ${tag}`).join('\n');
                    const frontmatter = `---\ntags:\n${yamlTags}\n---\n\n`;
                    finalExportText = frontmatter + markdownText;
                }
                const blob = new Blob([finalExportText], { type: 'text/markdown;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.setAttribute('download', filename);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            function triggerBulkExport() {
                const idsToExport = selectedIds.size > 0 ? [...selectedIds] : (activeNoteId ? [activeNoteId] : []);
                if (idsToExport.length === 0) {
                    alert('No notes selected.');
                    return;
                }
                idsToExport.forEach((id, index) => {
                    const targetNote = notes.find(n => n.id === id);
                    if (targetNote) {
                        setTimeout(() => {
                            downloadMarkdownFile(targetNote.title, targetNote.content, targetNote.tags);
                        }, index * 150);
                    }
                });
            }

            // ---------- Toolbar Active State ----------
            function updateToolbarState() {
                formatBtns.forEach(btn => {
                    const command = btn.getAttribute('data-command');
                    let isActive = false;
                    if (command === 'bold') isActive = document.queryCommandState('bold');
                    else if (command === 'italic') isActive = document.queryCommandState('italic');
                    else if (command === 'strikeThrough') isActive = document.queryCommandState('strikeThrough');
                    else if (command === 'insertUnorderedList') isActive = document.queryCommandState('insertUnorderedList');
                    else if (command === 'formatBlock') {
                        const value = btn.getAttribute('data-value') || '';
                        const currentFormat = document.queryCommandValue('formatBlock');
                        isActive = (currentFormat && currentFormat.toLowerCase() === value.toLowerCase());
                    }
                    if (isActive) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }

            document.addEventListener('selectionchange', () => {
                if (document.activeElement === noteContentEl) {
                    updateToolbarState();
                }
            });

            // ---------- Event Listeners ----------
            toggleSidebarBtn.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
            addNoteBtn.addEventListener('click', createNewNote);

            // ---------- Multi‑selection logic ----------
            function selectOnly(id) {
                selectedIds.clear();
                selectedIds.add(id);
                lastClickedId = id;
            }

            function toggleSelection(id) {
                if (selectedIds.has(id)) {
                    selectedIds.delete(id);
                    if (lastClickedId === id) lastClickedId = null;
                } else {
                    selectedIds.add(id);
                    lastClickedId = id;
                }
            }

            function selectRange(fromId, toId) {
                const sorted = getSortedNotes();
                const idxFrom = sorted.findIndex(n => n.id === fromId);
                const idxTo = sorted.findIndex(n => n.id === toId);
                if (idxFrom === -1 || idxTo === -1) return;
                const [start, end] = idxFrom < idxTo ? [idxFrom, idxTo] : [idxTo, idxFrom];
                for (let i = start; i <= end; i++) {
                    selectedIds.add(sorted[i].id);
                }
            }

            function handleNoteClick(noteId, event) {
                if (event.ctrlKey || event.metaKey) {
                    toggleSelection(noteId);
                    event.preventDefault();
                } else if (event.shiftKey) {
                    if (lastClickedId) {
                        selectRange(lastClickedId, noteId);
                    } else {
                        selectOnly(noteId);
                    }
                    event.preventDefault();
                } else {
                    selectOnly(noteId);
                    activeNoteId = noteId;
                    loadActiveNote();
                }
                renderNotesList();
            }

            notesListEl.addEventListener('click', (e) => {
                const li = e.target.closest('li');
                if (!li) return;
                const noteId = li.dataset.id;
                if (!noteId) return;
                handleNoteClick(noteId, e);
            });

            // ---------- Rubberband drag selection ----------
            let isDragging = false;
            let dragStartX, dragStartY;
            let initialSelectedIds = new Set();

            notesListEl.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                const li = e.target.closest('li');
                if (li) return;
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                initialSelectedIds = new Set(selectedIds);
                selectionOverlay.style.display = 'block';
                selectionOverlay.style.left = dragStartX + 'px';
                selectionOverlay.style.top = dragStartY + 'px';
                selectionOverlay.style.width = '0px';
                selectionOverlay.style.height = '0px';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const x1 = Math.min(dragStartX, e.clientX);
                const y1 = Math.min(dragStartY, e.clientY);
                const x2 = Math.max(dragStartX, e.clientX);
                const y2 = Math.max(dragStartY, e.clientY);
                selectionOverlay.style.left = x1 + 'px';
                selectionOverlay.style.top = y1 + 'px';
                selectionOverlay.style.width = (x2 - x1) + 'px';
                selectionOverlay.style.height = (y2 - y1) + 'px';

                selectedIds = new Set(initialSelectedIds);
                const notes = notesListEl.querySelectorAll('li');
                notes.forEach(li => {
                    const liRect = li.getBoundingClientRect();
                    if (liRect.left < x2 && liRect.right > x1 && liRect.top < y2 && liRect.bottom > y1) {
                        selectedIds.add(li.dataset.id);
                    }
                });
                renderNotesList();
            });

            document.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                selectionOverlay.style.display = 'none';
            });

            // ---------- Delete button ----------
            deleteNoteBtn.addEventListener('click', () => {
                const idsToDelete = selectedIds.size > 0 ? [...selectedIds] : (activeNoteId ? [activeNoteId] : []);
                if (idsToDelete.length === 0) {
                    alert('No notes selected.');
                    return;
                }
                if (confirm(`Delete ${idsToDelete.length} note(s)?`)) {
                    deleteNotes(idsToDelete);
                }
            });

            noteTitleInput.addEventListener('input', updateActiveNote);
            noteContentEl.addEventListener('input', updateActiveNote);

            // Export button
            exportSingleBtn.addEventListener('click', triggerBulkExport);

            // Formatting toolbar
            formatBtns.forEach(btn => {
                const cmd = btn.getAttribute('data-command');
                if (cmd === 'createLink' || cmd === 'insertImage') return;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const command = cmd;
                    let value = btn.getAttribute('data-value') || null;

                    if (command === 'formatBlock') {
                        const currentFormat = document.queryCommandValue('formatBlock');
                        if (currentFormat && currentFormat.toLowerCase() === value.toLowerCase()) {
                            value = 'DIV'; 
                        }
                    }

                    document.execCommand(command, false, value);
                    updateActiveNote();
                    noteContentEl.focus();
                    updateToolbarState();
                });
            });

            // ---------- Custom Link Popup ----------
            function saveCurrentSelection() {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && noteContentEl.contains(sel.anchorNode)) {
                    savedRange = sel.getRangeAt(0).cloneRange();
                } else {
                    savedRange = null;
                }
            }

            function restoreSelection() {
                if (savedRange) {
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(savedRange);
                } else {
                    noteContentEl.focus();
                }
            }

            function showLinkPopup() {
                saveCurrentSelection();
                if (savedRange && !savedRange.collapsed) {
                    linkTextInput.value = savedRange.toString();
                } else {
                    linkTextInput.value = '';
                }
                linkUrlInput.value = '';
                const linkBtn = document.querySelector('[data-command="createLink"]');
                const rect = linkBtn.getBoundingClientRect();
                linkPopup.style.top = (rect.bottom + 8) + 'px';
                linkPopup.style.left = (rect.left) + 'px';
                linkPopup.classList.add('visible');
                setTimeout(() => linkTextInput.focus(), 50);
            }

            function hideLinkPopup() {
                linkPopup.classList.remove('visible');
            }

            function insertLink() {
                const url = linkUrlInput.value.trim();
                const text = linkTextInput.value.trim();
                if (!url || !text) {
                    alert('Please enter both link text and URL.');
                    return;
                }

                restoreSelection();
                const sel = window.getSelection();
                if (sel.rangeCount) {
                    const range = sel.getRangeAt(0);
                    range.deleteContents();
                    const link = document.createElement('a');
                    link.href = url;
                    link.textContent = text;
                    range.insertNode(link);
                    range.setStartAfter(link);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                } else {
                    noteContentEl.focus();
                    document.execCommand('insertHTML', false, `<a href="${url}">${text}</a>`);
                }
                updateActiveNote();
                hideLinkPopup();
                noteContentEl.focus();
            }

            document.querySelector('[data-command="createLink"]').addEventListener('click', (e) => {
                e.preventDefault();
                if (linkPopup.classList.contains('visible')) {
                    hideLinkPopup();
                } else {
                    showLinkPopup();
                }
            });

            insertLinkBtn.addEventListener('click', insertLink);
            cancelLinkBtn.addEventListener('click', hideLinkPopup);

            document.addEventListener('click', (e) => {
                if (linkPopup.classList.contains('visible') && !e.target.closest('#link-popup') && !e.target.closest('[data-command="createLink"]')) {
                    hideLinkPopup();
                }
            });

            linkTextInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    linkUrlInput.focus();
                }
            });
            linkUrlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    insertLink();
                }
            });

            // ---------- Image Insertion & Resize ----------
            function showImagePopup() {
                saveCurrentSelection();
                imageUrlInput.value = '';
                imageAltInput.value = '';
                imageFileInput.value = '';
                imageFileName.textContent = '';
                const imgBtn = document.querySelector('[data-command="insertImage"]');
                const rect = imgBtn.getBoundingClientRect();
                imagePopup.style.top = (rect.bottom + 8) + 'px';
                imagePopup.style.left = (rect.left) + 'px';
                imagePopup.classList.add('visible');
                setTimeout(() => imageUrlInput.focus(), 50);
            }

            function hideImagePopup() {
                imagePopup.classList.remove('visible');
            }

            function insertImage(src, alt) {
                restoreSelection();
                const container = document.createElement('span');
                container.className = 'img-resize-container';
                container.contentEditable = 'false';
                const img = document.createElement('img');
                img.src = src;
                img.alt = alt || '';
                img.setAttribute('loading', 'lazy');
                const handle = document.createElement('span');
                handle.className = 'resize-handle';
                container.appendChild(img);
                container.appendChild(handle);

                const sel = window.getSelection();
                if (sel.rangeCount) {
                    const range = sel.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(container);
                    range.setStartAfter(container);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                } else {
                    noteContentEl.focus();
                    document.execCommand('insertHTML', false, container.outerHTML);
                }
                updateActiveNote();
                hideImagePopup();
                noteContentEl.focus();
            }

            function handleImageFromUrl() {
                const url = imageUrlInput.value.trim();
                const alt = imageAltInput.value.trim();
                if (!url) {
                    alert('Please enter an image URL.');
                    return;
                }
                insertImage(url, alt);
            }

            function handleImageFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const dataUrl = e.target.result;
                    const alt = imageAltInput.value.trim() || file.name;
                    insertImage(dataUrl, alt);
                };
                reader.readAsDataURL(file);
            }

            imageFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    imageFileName.textContent = file.name;
                }
            });

            insertImageBtn.addEventListener('click', () => {
                if (imageFileInput.files && imageFileInput.files[0]) {
                    handleImageFromFile(imageFileInput.files[0]);
                } else {
                    handleImageFromUrl();
                }
            });

            cancelImageBtn.addEventListener('click', hideImagePopup);

            document.addEventListener('click', (e) => {
                if (imagePopup.classList.contains('visible') && !e.target.closest('#image-popup') && !e.target.closest('[data-command="insertImage"]')) {
                    hideImagePopup();
                }
            });

            imageUrlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleImageFromUrl();
                }
            });

            document.querySelector('[data-command="insertImage"]').addEventListener('click', (e) => {
                e.preventDefault();
                if (imagePopup.classList.contains('visible')) {
                    hideImagePopup();
                } else {
                    showImagePopup();
                }
            });

            // ---------- Image Resizing ----------
            let resizeState = null;
            let rafId = null;

            noteContentEl.addEventListener('mousedown', (e) => {
                const handle = e.target.closest('.resize-handle');
                if (!handle) return;
                e.preventDefault();
                e.stopPropagation();
                const container = handle.parentElement;
                const img = container.querySelector('img');
                if (!img) return;
                const rect = img.getBoundingClientRect();
                img.style.maxWidth = 'none';
                img.style.maxHeight = 'none';
                resizeState = {
                    img,
                    startX: e.clientX,
                    startY: e.clientY,
                    startWidth: rect.width,
                    startHeight: rect.height,
                    aspect: rect.width / rect.height,
                };
            });

            function onResizeMove(e) {
                if (!resizeState) return;
                const deltaX = e.clientX - resizeState.startX;
                const deltaY = e.clientY - resizeState.startY;
                let newWidth, newHeight;
                if (e.shiftKey) {
                    newWidth = resizeState.startWidth + deltaX;
                    newHeight = resizeState.startHeight + deltaY;
                } else {
                    const maxDelta = Math.max(Math.abs(deltaX), Math.abs(deltaY)) * (deltaX > 0 || deltaY > 0 ? 1 : -1);
                    newWidth = resizeState.startWidth + maxDelta;
                    newHeight = newWidth / resizeState.aspect;
                }
                newWidth = Math.max(20, newWidth);
                newHeight = Math.max(20, newHeight);
                resizeState.img.style.width = newWidth + 'px';
                resizeState.img.style.height = newHeight + 'px';
            }

            document.addEventListener('mousemove', (e) => {
                if (!resizeState) return;
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(() => {
                    onResizeMove(e);
                    rafId = null;
                });
            });

            document.addEventListener('mouseup', () => {
                if (resizeState) {
                    resizeState = null;
                    updateActiveNote(); 
                }
            });

            // ---------- Blockquote Helpers & Keyboard ----------
            function getBlockquoteAncestor() {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                let node = sel.anchorNode;
                while (node && node !== noteContentEl) {
                    if (node.nodeName === 'BLOCKQUOTE') return node;
                    node = node.parentNode;
                }
                return null;
            }

            function getCurrentBlockElement(container) {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                let node = sel.anchorNode;
                while (node && node !== container) {
                    if (/^(P|DIV|H[1-6]|BLOCKQUOTE)$/.test(node.nodeName)) {
                        return node;
                    }
                    node = node.parentNode;
                }
                return null;
            }

            noteContentEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const blockquote = getBlockquoteAncestor();
                    if (blockquote) {
                        e.preventDefault();
                        if (lastKeyWasEnter) {
                            const sel = window.getSelection();
                            const currentBlock = getCurrentBlockElement(blockquote);
                            if (currentBlock && currentBlock !== blockquote && currentBlock.textContent.trim() === '') {
                                currentBlock.parentNode.removeChild(currentBlock);
                            }
                            const newPara = document.createElement('p');
                            newPara.innerHTML = '<br>';
                            blockquote.parentNode.insertBefore(newPara, blockquote.nextSibling);
                            const range = document.createRange();
                            range.setStart(newPara, 0);
                            range.collapse(true);
                            sel.removeAllRanges();
                            sel.addRange(range);
                            lastKeyWasEnter = false;
                            updateActiveNote();
                        } else {
                            const sel = window.getSelection();
                            if (sel.rangeCount) {
                                const range = sel.getRangeAt(0);
                                const newPara = document.createElement('p');
                                newPara.innerHTML = '<br>';
                                blockquote.appendChild(newPara);
                                range.setStart(newPara, 0);
                                range.collapse(true);
                                sel.removeAllRanges();
                                sel.addRange(range);
                            }
                            lastKeyWasEnter = true;
                        }
                        return;
                    }
                }

                if (e.key !== 'Enter') lastKeyWasEnter = false;

                if (e.key === 'Tab') {
                    e.preventDefault();
                    if (e.shiftKey) document.execCommand('outdent', false, null);
                    else document.execCommand('indent', false, null);
                }
            });

            noteContentEl.addEventListener('mousedown', () => {
                lastKeyWasEnter = false;
            });

            noteContentEl.addEventListener("paste", function(e) {
                e.preventDefault();
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
                setTimeout(enforceTypewriterScroll, 50); // Small delay to let paste render before centering
            });

            init();
            updateToolbarState();
        });
    </script>
</body>
</html>
